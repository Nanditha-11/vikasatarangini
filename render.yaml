services:
  - type: web
    name: vikasatarangini
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        value: vikasatarangini
      - key: ADMIN_PASSWORD
        value: jeeyarswamy

